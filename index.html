<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zacky | Portfolio Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, sans-serif;
    }

    body {
      background: #0f172a;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 600px;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      margin-bottom: 0.3rem;
    }

    p {
      color: #94a3b8;
      margin-bottom: 2rem;
    }

    .links {
      display: grid;
      gap: 1rem;
    }

    .links a {
      display: block;
      padding: 1rem;
      border-radius: 8px;
      background: #1e293b;
      color: #e5e7eb;
      text-decoration: none;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .links a:hover {
      background: #334155;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Zacky</h1>
    <p>Multimedia Designer · Artist</p>

    <div class="links">
      <a href="https://zackydesigns.github.io/"
         target="_blank" rel="noopener noreferrer">
        Interactive CV
      </a>

      <a href="https://zackydesigns.github.io/KAPorfolio/"
         target="_blank" rel="noopener noreferrer">
        Kase Artist Portfolio
      </a>

      <a href="https://zackydesigns.github.io/Social-Media-Branding/"
         target="_blank" rel="noopener noreferrer">
        Social Media Branding
      </a>

      <a href="#"
         target="_blank" rel="noopener noreferrer">
        Kixi Portfolio
      </a>

      <a href="https://zackydesigns.github.io/GraphiteAr"
         target="_blank" rel="noopener noreferrer">
        Graphite Drawing Portfolio
      </a>
    </div>
  </div>
</body>
</html>
